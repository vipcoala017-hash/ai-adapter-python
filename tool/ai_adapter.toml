[common]
# Default project directory, resolved relative to this config file.
project_dir = "../project"
# Runtime directory created under project_dir.
runtime_dir = "runtime"

[ai_config]
# AI config directory, resolved relative to this config file.
dir = "../ai_config"
# Whether to delete generated ai_config artifacts after run completes.
cleanup_generated_artifacts = true

[prd]
# Default PRD alias used when --prd-name/--prd-path is omitted.
default = "default"

[prd.refs]
# PRD alias -> path relative to project_dir.
default = "PRD.toml"

[ai]
# Active provider name. It must match one of [providers.xxx].
ai_provider = "copilot"
# Default agent used when --agent is omitted.
default_agent = "general-senior-dev-agent"
# How prompt text is passed to the CLI: stdin or arg.
prompt_mode = "stdin"
# Child process launch mode: auto, direct, powershell, or bash.
# auto prefers bash and falls back to powershell.exe on Windows.
launch_mode = "auto"
# Timeout for one invocation, in seconds.
timeout_seconds = 600
# Whether to append --yolo.
yolo = true

[providers.codex]
# Provider CLI template.
cli = 'codex exec -c model="{{agent.model.codex}}" -c model_instructions_file="{{agent_file}}" --skip-git-repo-check {{yolo:--yolo}}'

[providers.copilot]
# Provider CLI template.
cli = 'copilot --agent {{agent.name}} --model {{agent.model.copilot}} --config-dir "{{ai_config_dir}}" --no-ask-user {{yolo:--yolo}}'

[providers.claude]
# Provider CLI template.
cli = 'claude --model "{{agent.model.claude}}" {{yolo:--yolo}}'

[agents.general-senior-dev-agent]
# The agent name must match the markdown file under .codex/agents/.
name = "general-senior-dev-agent"
model = { codex = "gpt-5.4-mini", copilot = "gpt-5.4", claude = "claude-3.5-sonnet" }
