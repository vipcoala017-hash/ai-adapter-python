[common]
# Target project directory, resolved relative to this config file.
target_dir = "../project"
# Runtime directory created under target_dir.
runtime_dir = "runtime"

[ai]
# Active provider name. It must match one of [providers.xxx].
ai_provider = "codex"
# Default agent used when --agent is omitted.
default_agent = "general-senior-dev-agent"
# How prompt text is passed to the CLI: stdin or arg.
prompt_mode = "stdin"
# Child process launch mode: direct, powershell, or bash.
launch_mode = "bash"
# Timeout for one invocation, in seconds.
timeout_seconds = 600
# Whether to append --yolo.
yolo = true

[providers.codex]
# Provider CLI template.
cli = 'codex exec -c model="{{agent.model.codex}}" -c model_instructions_file=".\\.copilot\\agents\\{{agent.name}}.md" --skip-git-repo-check {{yolo:--yolo}}'

[providers.copilot]
# Provider CLI template.
cli = 'copilot -p "{{prompt}}" -agent "{{agent.name}}" -model "{{agent.model.copilot}}"'

[providers.claude]
# Provider CLI template.
cli = 'claude --model "{{agent.model.claude}}" {{yolo:--yolo}}'

[agents.general-senior-dev-agent]
# The agent name must match the markdown file under .codex/agents/.
name = "general-senior-dev-agent"
model = { codex = "gpt-5.4-mini", copilot = "gpt-5.4-mini", claude = "claude-3.5-sonnet" }
